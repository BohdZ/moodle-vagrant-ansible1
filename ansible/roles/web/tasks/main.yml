- name: Install Apache and PHP
  apt:
    name:
      - apache2
      - php
      - libapache2-mod-php
      - php-mysql
      - php-xml
      - php-gd
      - php-curl
      - php-intl
      - php-zip
      - php-mbstring
      - php-soap
      - php-cli
      - php-common
      - php-xmlrpc
    state: present

- name: Enable Apache rewrite module
  apache2_module:
    name: rewrite
    state: present

- name: Restart Apache
  service:
    name: apache2
    state: restarted
    enabled: yes
